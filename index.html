<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>احترافي AR الرسم والتتبع</title>
    <style>
        /* ========== المتغيرات الأساسية ========== */
        :root {
            --primary: #00e676;
            --primary-dark: #00c853;
            --bg-dark: #121212;
            --bg-glass: rgba(30, 30, 30, 0.75);
            --border-glass: rgba(255, 255, 255, 0.15);
            --text-light: #f5f5f5;
            --danger: #ff5252;
            --success: #00e676;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            --radius: 18px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
        }

        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            color: var(--text-light);
        }

        /* ========== شاشة طلب الإذن ========== */
        #permission-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            text-align: center;
        }

        #permission-overlay h2 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 16px;
            font-weight: 500;
        }

        #permission-overlay p {
            color: #aaa;
            font-size: 16px;
            line-height: 1.7;
            max-width: 380px;
            margin-bottom: 32px;
        }

        #start-camera-btn {
            background: var(--primary);
            color: #000;
            font-size: 18px;
            font-weight: 600;
            padding: 16px 42px;
            border: none;
            border-radius: 50px;
            box-shadow: 0 0 25px rgba(0, 230, 118, 0.4);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #start-camera-btn:active {
            transform: scale(0.96);
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.6);
        }

        /* ========== عناصر الرسم الأساسية ========== */
        #camera-feed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            pointer-events: none; /* الكاميرا خلفية فقط */
        }

        #image-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            z-index: 2;
            display: none;
            touch-action: none;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(2px);
            transition: border 0.2s;
            cursor: grab;
        }

        #image-container.locked {
            border: none;
            pointer-events: none;
            cursor: default;
            background: transparent;
            backdrop-filter: none;
        }

        #trace-image {
            max-width: 85vw;
            max-height: 85vh;
            opacity: 0.5;
            display: block;
            pointer-events: none;
            border-radius: 8px;
        }

        #drawing-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            touch-action: none;
        }

        /* ========== لوحة التحكم الرئيسية ========== */
        #ui-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 520px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            padding: 18px 16px;
            z-index: 10;
            box-shadow: var(--shadow);
            transition: bottom 0.35s cubic-bezier(0.2, 0.9, 0.3, 1), opacity 0.3s;
        }

        #ui-panel.hidden {
            bottom: -300px;
            opacity: 0;
            pointer-events: none;
        }

        #toggle-ui {
            position: absolute;
            bottom: 24px;
            right: 20px;
            width: 52px;
            height: 52px;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            z-index: 11;
            box-shadow: var(--shadow);
            transition: transform 0.2s, background 0.2s;
            color: white;
        }

        #toggle-ui:active {
            transform: scale(0.9);
            background: rgba(80, 80, 80, 0.8);
        }

        /* صفوف الأزرار */
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
            align-items: center;
        }

        .row:last-child {
            margin-bottom: 0;
        }

        /* الأزرار الأساسية */
        .btn {
            flex: 1 1 0;
            min-width: 70px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 6px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, border-color 0.2s;
            line-height: 1.3;
            backdrop-filter: blur(5px);
        }

        .btn span:first-child {
            font-size: 18px; /* رمز بسيط (غير إيموجي) */
        }

        .btn:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.96);
        }

        .btn.active-toggle {
            background: var(--primary);
            border-color: var(--primary);
            color: #000;
            font-weight: 600;
        }

        .btn.danger {
            color: var(--danger);
        }

        .btn.primary-bg {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }

        /* عناصر التحكم المنزلقة */
        .slider-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
        }

        .slider-group label {
            font-size: 13px;
            font-weight: 500;
            color: #ccc;
            min-width: 60px;
        }

        .slider-group input[type="range"] {
            flex: 1;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            -webkit-appearance: none;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--primary);
            border: 2px solid white;
        }

        .slider-group input[type="color"] {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 50%;
            padding: 0;
        }

        .slider-group input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .slider-group input[type="color"]::-webkit-color-swatch {
            border: 2px solid white;
            border-radius: 50%;
        }

        .slider-group span:last-of-type {
            min-width: 35px;
            text-align: center;
            font-size: 13px;
            color: #ddd;
        }

        /* مؤشر التسجيل */
        .recording-indicator {
            background: var(--danger) !important;
            color: white !important;
            border-color: var(--danger) !important;
            animation: pulse 1.3s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 82, 82, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); }
        }

        /* مخفي لعنصر رفع الملف */
        #image-upload {
            display: none;
        }

        /* رسالة خطأ */
        .error-toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(255, 70, 70, 0.9);
            backdrop-filter: blur(5px);
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 50px;
            font-weight: 500;
            z-index: 200;
            animation: fadeInOut 3s forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }
    </style>
</head>
<body>
    <!-- شاشة الإذن -->
    <div id="permission-overlay">
        <h2>AR الرسم الاحترافي</h2>
        <p>لبدء تجربة الرسم بالتتبع المباشر، الرجاء السماح بالوصول إلى الكاميرا الخلفية.</p>
        <button id="start-camera-btn">▶ تشغيل الكاميرا</button>
    </div>

    <!-- عناصر الرسم -->
    <video id="camera-feed" autoplay playsinline muted></video>
    <div id="image-container">
        <img id="trace-image" alt="صورة التتبع">
    </div>
    <canvas id="drawing-canvas"></canvas>

    <!-- زر إظهار/إخفاء اللوحة -->
    <div id="toggle-ui">⚙️</div>

    <!-- لوحة التحكم -->
    <div id="ui-panel" class="hidden">
        <!-- الصف الأول: رفع، قفل، تراجع -->
        <div class="row">
            <label for="image-upload" class="btn">
                <span>📁</span>
                <span>رفع</span>
            </label>
            <input type="file" id="image-upload" accept="image/*">
            <div class="btn" id="lock-btn">
                <span>🔓</span>
                <span>قفل</span>
            </div>
            <div class="btn" id="undo-btn">
                <span>↩️</span>
                <span>تراجع</span>
            </div>
        </div>
        <!-- الصف الثاني: مسح، حفظ، تسجيل -->
        <div class="row">
            <div class="btn danger" id="clear-btn">
                <span>🗑️</span>
                <span>مسح</span>
            </div>
            <div class="btn primary-bg" id="save-btn">
                <span>🖼️</span>
                <span>حفظ</span>
            </div>
            <div class="btn" id="record-btn">
                <span>⏺️</span>
                <span>تسجيل</span>
            </div>
        </div>
        <!-- شريط الشفافية -->
        <div class="slider-group">
            <label>الشفافية</label>
            <input type="range" id="opacity-slider" min="0.1" max="1" step="0.05" value="0.5">
            <span id="opacity-value">0.5</span>
        </div>
        <!-- شريط التكبير -->
        <div class="slider-group">
            <label>التكبير</label>
            <input type="range" id="scale-slider" min="0.3" max="3" step="0.1" value="1">
            <span id="scale-value">1.0</span>
        </div>
        <!-- لون الفرشاة والحجم -->
        <div class="slider-group">
            <input type="color" id="color-picker" value="#00e676">
            <label>الحجم</label>
            <input type="range" id="brush-size" min="1" max="20" value="3">
            <span id="brush-value">3</span>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ----- المتغيرات العامة -----
            const overlay = document.getElementById('permission-overlay');
            const startBtn = document.getElementById('start-camera-btn');
            const video = document.getElementById('camera-feed');
            const canvas = document.getElementById('drawing-canvas');
            const ctx = canvas.getContext('2d');
            const uiPanel = document.getElementById('ui-panel');
            const toggleBtn = document.getElementById('toggle-ui');
            const imageContainer = document.getElementById('image-container');
            const traceImage = document.getElementById('trace-image');
            const imageUpload = document.getElementById('image-upload');
            const opacitySlider = document.getElementById('opacity-slider');
            const scaleSlider = document.getElementById('scale-slider');
            const lockBtn = document.getElementById('lock-btn');
            const undoBtn = document.getElementById('undo-btn');
            const clearBtn = document.getElementById('clear-btn');
            const saveBtn = document.getElementById('save-btn');
            const recordBtn = document.getElementById('record-btn');
            const colorPicker = document.getElementById('color-picker');
            const brushSize = document.getElementById('brush-size');

            // عداد للقيم
            document.getElementById('opacity-value').innerText = opacitySlider.value;
            document.getElementById('scale-value').innerText = scaleSlider.value;
            document.getElementById('brush-value').innerText = brushSize.value;

            // متغيرات الرسم
            let isDrawing = false;
            let lastX = 0, lastY = 0;
            let paths = [];          // مصفوفة المسارات الكاملة
            let currentPath = [];     // المسار الحالي

            // متغيرات الصورة
            let isImageLocked = false;
            let currentScale = 1;
            let translateX = 0, translateY = 0;
            let isDraggingImage = false;
            let dragStartX = 0, dragStartY = 0;

            // متغيرات تسجيل الفيديو
            let mediaRecorder = null;
            let recordedChunks = [];
            let isRecording = false;
            let recordAnimationId = null;
            const recordCanvas = document.createElement('canvas');
            const recordCtx = recordCanvas.getContext('2d');

            // حالة واجهة المستخدم
            let uiVisible = false; // تبدأ مخفية بعد تشغيل الكاميرا

            // ----- دالة لعرض رسالة خطأ مؤقتة -----
            function showError(msg) {
                const toast = document.createElement('div');
                toast.className = 'error-toast';
                toast.innerText = msg;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            // ----- تشغيل الكاميرا -----
            startBtn.addEventListener('click', async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: { ideal: 'environment' } } 
                    });
                    video.srcObject = stream;
                    overlay.style.display = 'none';
                    uiPanel.classList.remove('hidden');
                    toggleBtn.style.display = 'flex';
                    uiVisible = true;
                    resizeCanvas();
                } catch (err) {
                    alert('تعذر الوصول إلى الكاميرا. تحقق من الصلاحيات.');
                }
            });

            // ----- ضبط حجم اللوحة القماشية -----
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                redrawPaths();  // إعادة رسم المسارات بعد تغيير الحجم
            }
            window.addEventListener('resize', resizeCanvas);

            // ----- إعادة رسم جميع المسارات -----
            function redrawPaths() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                paths.forEach(path => {
                    if (path.length === 0) return;
                    ctx.beginPath();
                    ctx.moveTo(path[0].x, path[0].y);
                    for (let i = 1; i < path.length; i++) {
                        ctx.lineTo(path[i].x, path[i].y);
                    }
                    ctx.strokeStyle = path[0].color || '#00e676';
                    ctx.lineWidth = path[0].size || 3;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();
                });
            }

            // ----- أحداث الرسم (تعمل باللمس والماوس) -----
            function getPos(e) {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return [clientX, clientY];
            }

            function startDrawing(e) {
                e.preventDefault();
                isDrawing = true;
                const [x, y] = getPos(e);
                lastX = x;
                lastY = y;
                currentPath = [{
                    x, y,
                    color: colorPicker.value,
                    size: parseInt(brushSize.value, 10)
                }];
            }

            function draw(e) {
                if (!isDrawing) return;
                e.preventDefault();
                const [x, y] = getPos(e);
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = colorPicker.value;
                ctx.lineWidth = brushSize.value;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();

                currentPath.push({ x, y });
                lastX = x;
                lastY = y;
            }

            function stopDrawing() {
                if (isDrawing) {
                    isDrawing = false;
                    if (currentPath.length > 0) {
                        paths.push([...currentPath]);
                    }
                    currentPath = [];
                }
            }

            // ربط أحداث الرسم
            canvas.addEventListener('touchstart', startDrawing, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', stopDrawing);
            canvas.addEventListener('touchcancel', stopDrawing);

            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseleave', stopDrawing);

            // ----- أزرار الرسم -----
            undoBtn.addEventListener('click', () => {
                paths.pop();
                redrawPaths();
            });

            clearBtn.addEventListener('click', () => {
                paths = [];
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });

            // حفظ الصورة (الرسم فقط)
            saveBtn.addEventListener('click', () => {
                const link = document.createElement('a');
                link.download = `ar-drawing-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });

            // ----- رفع الصورة ومعالجتها -----
            imageUpload.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    traceImage.src = ev.target.result;
                    imageContainer.style.display = 'block';
                    // إعادة تعيين الموضع والحجم
                    currentScale = 1;
                    translateX = 0;
                    translateY = 0;
                    scaleSlider.value = '1';
                    document.getElementById('scale-value').innerText = '1.0';
                    updateImageTransform();
                };
                reader.readAsDataURL(file);
            });

            // تحديث موقع الصورة
            function updateImageTransform() {
                imageContainer.style.transform = 
                    `translate(calc(-50% + ${translateX}px), calc(-50% + ${translateY}px)) scale(${currentScale})`;
            }

            // سحب الصورة (باستخدام pointer events للتبسيط)
            function onDragStart(e) {
                if (isImageLocked) return;
                e.preventDefault();
                isDraggingImage = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                dragStartX = clientX - translateX;
                dragStartY = clientY - translateY;
                imageContainer.style.cursor = 'grabbing';
            }

            function onDragMove(e) {
                if (!isDraggingImage || isImageLocked) return;
                e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                translateX = clientX - dragStartX;
                translateY = clientY - dragStartY;
                updateImageTransform();
            }

            function onDragEnd() {
                isDraggingImage = false;
                imageContainer.style.cursor = 'grab';
            }

            // ربط أحداث السحب
            imageContainer.addEventListener('touchstart', onDragStart, { passive: false });
            imageContainer.addEventListener('touchmove', onDragMove, { passive: false });
            imageContainer.addEventListener('touchend', onDragEnd);
            imageContainer.addEventListener('mousedown', onDragStart);
            window.addEventListener('mousemove', onDragMove);
            window.addEventListener('mouseup', onDragEnd);

            // قفل الصورة
            lockBtn.addEventListener('click', () => {
                isImageLocked = !isImageLocked;
                if (isImageLocked) {
                    imageContainer.classList.add('locked');
                    lockBtn.classList.add('active-toggle');
                    lockBtn.innerHTML = '<span>🔒</span><span>مقفول</span>';
                } else {
                    imageContainer.classList.remove('locked');
                    lockBtn.classList.remove('active-toggle');
                    lockBtn.innerHTML = '<span>🔓</span><span>قفل</span>';
                }
            });

            // تحكم الشفافية
            opacitySlider.addEventListener('input', (e) => {
                traceImage.style.opacity = e.target.value;
                document.getElementById('opacity-value').innerText = e.target.value;
            });

            // تحكم التكبير
            scaleSlider.addEventListener('input', (e) => {
                currentScale = parseFloat(e.target.value);
                document.getElementById('scale-value').innerText = currentScale.toFixed(1);
                updateImageTransform();
            });

            // تحديث حجم الفرشاة
            brushSize.addEventListener('input', (e) => {
                document.getElementById('brush-value').innerText = e.target.value;
            });

            // ----- تسجيل الفيديو (بدون الصورة الشفافة) -----
            recordBtn.addEventListener('click', () => {
                if (!isRecording) {
                    // بدء التسجيل
                    if (!video.srcObject) {
                        showError('الكاميرا غير متوفرة');
                        return;
                    }

                    // إعداد canvas للتسجيل بنفس أبعاد شاشة الرسم
                    recordCanvas.width = canvas.width;
                    recordCanvas.height = canvas.height;

                    // محاولة إنشاء MediaRecorder
                    let stream;
                    try {
                        stream = recordCanvas.captureStream(30);
                    } catch (err) {
                        showError('المتصفح لا يدعم تسجيل الفيديو');
                        return;
                    }

                    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                    recordedChunks = [];

                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) recordedChunks.push(e.data);
                    };

                    mediaRecorder.onstop = () => {
                        const blob = new Blob(recordedChunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `ar-recording-${Date.now()}.webm`;
                        a.click();
                        URL.revokeObjectURL(url);
                        recordedChunks = [];
                    };

                    // بدء التسجيل
                    mediaRecorder.start();
                    isRecording = true;
                    recordBtn.classList.add('recording-indicator');
                    recordBtn.innerHTML = '<span>⏹️</span><span>إيقاف</span>';

                    // إخفاء اللوحة تلقائياً
                    uiPanel.classList.add('hidden');
                    toggleBtn.innerText = '⬆';
                    uiVisible = false;

                    // حلقة التسجيل
                    function drawFrame() {
                        if (!isRecording) return;

                        // رسم الكاميرا في recordCanvas
                        const vw = video.videoWidth;
                        const vh = video.videoHeight;
                        const cw = recordCanvas.width;
                        const ch = recordCanvas.height;
                        if (vw && vh) {
                            const vRatio = vw / vh;
                            const cRatio = cw / ch;
                            let drawW, drawH, offsetX, offsetY;

                            if (vRatio > cRatio) {
                                drawH = ch;
                                drawW = drawH * vRatio;
                                offsetX = (cw - drawW) / 2;
                                offsetY = 0;
                            } else {
                                drawW = cw;
                                drawH = drawW / vRatio;
                                offsetX = 0;
                                offsetY = (ch - drawH) / 2;
                            }
                            recordCtx.drawImage(video, offsetX, offsetY, drawW, drawH);
                        }

                        // رسم الخطوط (بدون الصورة الشفافة)
                        recordCtx.drawImage(canvas, 0, 0);

                        recordAnimationId = requestAnimationFrame(drawFrame);
                    }

                    drawFrame();

                } else {
                    // إيقاف التسجيل
                    isRecording = false;
                    mediaRecorder.stop();
                    cancelAnimationFrame(recordAnimationId);
                    recordBtn.classList.remove('recording-indicator');
                    recordBtn.innerHTML = '<span>⏺️</span><span>تسجيل</span>';
                }
            });

            // ----- إظهار/إخفاء اللوحة -----
            toggleBtn.addEventListener('click', () => {
                uiVisible = !uiVisible;
                if (uiVisible) {
                    uiPanel.classList.remove('hidden');
                    toggleBtn.innerText = '⬇';
                } else {
                    uiPanel.classList.add('hidden');
                    toggleBtn.innerText = '⬆';
                }
            });

            // تحديث recordCanvas عند تغير حجم النافذة
            window.addEventListener('resize', () => {
                recordCanvas.width = canvas.width;
                recordCanvas.height = canvas.height;
            });

            // أيقونة السحب الافتراضية
            imageContainer.style.cursor = 'grab';
        })();
    </script>
</body>
</html>
